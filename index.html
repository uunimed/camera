<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>გლობალური უსაფრთხოების კამერა (COCO-SSD)</title>
    
    <!-- TensorFlow.js და COCO-SSD ადამიანის/ტანის იდენტიფიკაციისთვის -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <!-- Firebase SDK-ები -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #f0f4f8;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #334155;
            transition: background-color 0.1s ease; /* ეკრანის მომენტალური გაწითლებისთვის */
        }
        
        /* ძირითადზე ეკრანის გაწითლება */
        body.main-alarm {
            background-color: #fca5a5 !important;
        }

        /* დამხმარეზე ეკრანის აგრესიული ციმციმი */
        body.sub-flashing {
            animation: flash-screen 0.4s infinite alternate;
        }
        @keyframes flash-screen {
            from { background-color: #f0f4f8; }
            to { background-color: #ef4444; }
        }

        .app-container {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 32px;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        h1 { 
            font-size: 1.8rem; 
            margin-bottom: 16px; 
            color: #1e293b; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        
        .choice-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 24px;
        }
        button {
            padding: 16px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-main { background: #4a90e2; color: white; }
        .btn-main:hover { background: #357abd; }
        .btn-sub { background: #10b981; color: white; }
        .btn-sub:hover { background: #059669; }
        
        .back-btn {
            background: #64748b;
            color: white;
            padding: 10px 20px;
            font-size: 0.95rem;
            margin-top: 20px;
        }
        .back-btn:hover { background: #475569; }
        
        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            margin: 20px auto;
            border: 3px solid #4a90e2;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }
        #video, #liveImage { width: 100%; height: 100%; object-fit: cover; display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .status-panel {
            background: #334155;
            border-radius: 12px;
            padding: 14px 24px;
            color: #ffffff;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-panel.identified { background: #10b981; }
        .status-panel.danger { background: #b91c1c; }
        .hidden { display: none !important; }
        .svg-icon { display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body id="bodyNode" onclick="handleUserClick()">

<div class="app-container">
    <h1>
        <span class="svg-icon">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="#4a90e2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </span>
        გლობალური დაცვის სისტემა
    </h1>
    
    <!-- 1. საწყისი არჩევანის ეკრანი -->
    <div id="setupScreen">
        <p style="color: #64748b; margin-bottom: 20px;">გთხოვთ აირჩიოთ ამ მოწყობილობის როლი სისტემაში:</p>
        <div class="choice-box">
            <button class="btn-main" onclick="initRole('main')">
                <span class="svg-icon">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><circle cx="12" cy="12" r="3.2"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                </span>
                ძირითადი მოწყობილობა (კამერა)
            </button>
            <button class="btn-sub" onclick="initRole('sub')">
                <span class="svg-icon">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M20 3H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h3l-1 2v1h12v-1l-1-2h3c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 13H4V5h16v11z"/></svg>
                </span>
                სხვა მოწყობილობა (მონიტორინგი)
            </button>
        </div>
    </div>

    <!-- 2. სამუშაო ეკრანი -->
    <div id="workScreen" class="hidden">
        <p id="roleTitle" style="font-weight: bold; color: #4a90e2; margin-bottom: 8px;"></p>
        <p id="subHint" style="color: #ef4444; font-size: 0.9rem; font-weight: 600;" class="hidden">ხელის შეხებით განგაშის ხმა გაითიშება</p>
        
        <div class="camera-wrapper">
            <video id="video" autoplay muted playsinline class="hidden"></video>
            <canvas id="overlay" class="hidden"></canvas>
            <img id="liveImage" class="hidden" alt="Live Stream...">
        </div>

        <div id="statusPanel" class="status-panel">სისტემა მზადყოფნაშია</div>
        
        <button class="back-btn" onclick="resetToSetup()">
            <span class="svg-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </span>
            უკან დაბრუნება
        </button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBqvEqhNXaID7jkSNJDn3attnM8enLbt2c",
        authDomain: "camera-5ea2d.firebaseapp.com",
        projectId: "camera-5ea2d",
        storageBucket: "camera-5ea2d.firebasestorage.app",
        messagingSenderId: "1008116795629",
        appId: "1:1008116795629:web:32e812624d17ff981b64e4",
        measurementId: "G-36LNH93G1S"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentRole = null;
    let netModel = null;
    let isSpeaking = false;
    let mainLoopTimeout = null;
    let streamTrack = null;

    // კოორდინატების ტრეკინგი ადამიანისთვის/ტანისთვის
    let lastPersonCenter = null; 
    let wasPersonIdentified = false;
    const MOTION_THRESHOLD = 35; // 35 პიქსელი გადაადგილება კადრში ~10 სმ

    // უწყვეტი განგაშის კონტროლი (დამხმარე მოწყობილობისთვის)
    let isSubAlarmActive = false;
    let subAlarmInterval = null;

    const bodyNode = document.getElementById('bodyNode');
    const setupScreen = document.getElementById('setupScreen');
    const workScreen = document.getElementById('workScreen');
    const roleTitle = document.getElementById('roleTitle');
    const subHint = document.getElementById('subHint');
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const liveImage = document.getElementById('liveImage');
    const statusPanel = document.getElementById('statusPanel');

    const svgIcons = {
        scan: `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="animation: rotation 2s linear infinite;"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>`,
        alert: `<svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>`,
        success: `<svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`
    };

    // მომხმარებლის კლიკის დამუშავება განგაშის გასათიშად (დამხმარე მოწყობილობაზე)
    function handleUserClick() {
        if (currentRole === 'sub' && isSubAlarmActive) {
            stopSubContinuousAlarm();
        }
    }

    async function initRole(role) {
        currentRole = role;
        setupScreen.classList.add('hidden');
        workScreen.classList.remove('hidden');

        if (role === 'main') {
            roleTitle.innerText = "რეჟიმი: ძირითადი მოწყობილობა (კამერა)";
            video.classList.remove('hidden');
            overlay.classList.remove('hidden');
            statusPanel.innerHTML = `${svgIcons.scan} იტვირთება TensorFlow COCO-SSD მოდელი...`;
            await preloadCOCOModel();
        } else {
            roleTitle.innerText = "რეჟიმი: სხვა მოწყობილობა (მონიტორინგი)";
            subHint.classList.remove('hidden');
            liveImage.classList.remove('hidden');
            statusPanel.innerHTML = `${svgIcons.scan} მიმდინარეობს ლაივ სტრიმთან დაკავშირება...`;
            startMonitoring();
        }
    }

    async function preloadCOCOModel() {
        try {
            netModel = await cocoSsd.load({ base: 'lite_mobilenet_v2' }); // მსუბუქი და სწრაფი ვერსია რეალურ დროში მუშაობისთვის
            statusPanel.innerHTML = `${svgIcons.scan} მოდელი მზადაა. იხსნება კამერა...`;
            startCamera();
        } catch (e) {
            statusPanel.innerHTML = `${svgIcons.alert} შეცდომა მოდელის ჩატვირთვისას!`;
        }
    }

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300 } });
            video.srcObject = stream;
            streamTrack = stream.getTracks()[0];
            video.onloadedmetadata = () => {
                video.play();
                statusPanel.innerHTML = `${svgIcons.success} დაცვა აქტიურია - ადამიანი არ ჩანს`;
                detectAndStreamLoop();
            };
        } catch (err) {
            statusPanel.innerHTML = `${svgIcons.alert} შეცდომა: კამერა ვერ ჩაირთო!`;
        }
    }

    // --- ძირითადი მოწყობილობა (კამერა + დეტექცია) ---
    async function detectAndStreamLoop() {
        if (currentRole !== 'main' || !netModel || video.paused) return;

        // სტრიმინგი ბაზაში
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 320; tempCanvas.height = 240;
        tempCanvas.getContext('2d').drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        db.ref('stream/frame').set(tempCanvas.toDataURL('image/jpeg', 0.4));

        try {
            // ობიექტების ამოცნობა
            const predictions = await netModel.detect(video);
            const ctx = overlay.getContext('2d');
            
            // ვფილტრავთ, რომ ბიბლიოთეკამ მხოლოდ ადამიანი/ტანი (person) აღიქვას
            const person = predictions.find(p => p.class === 'person');

            if (person) {
                db.ref('stream/lostAlarm').set(false);
                wasPersonIdentified = true;

                const displaySize = { width: video.videoWidth, height: video.videoHeight };
                overlay.width = displaySize.width;
                overlay.height = displaySize.height;
                ctx.clearRect(0, 0, overlay.width, overlay.height);

                // გამოვთვალოთ ადამიანის ცენტრი (ტანიც და თავიც ერთიანად)
                const [bx, by, bWidth, bHeight] = person.bbox;
                const currentCenter = { x: bx + bWidth / 2, y: by + bHeight / 2 };

                let strokeColor = '#10b981';
                let statusMessage = `${svgIcons.success} ადამიანის იდენტიფიკაცია მოხდა`;
                let panelClass = 'identified';

                if (lastPersonCenter) {
                    const distance = Math.sqrt(Math.pow(currentCenter.x - lastPersonCenter.x, 2) + Math.pow(currentCenter.y - lastPersonCenter.y, 2));

                    // თუ მოძრაობა 10 სმ-ზე მეტია
                    if (distance > MOTION_THRESHOLD) {
                        strokeColor = '#ef4444';
                        statusMessage = `${svgIcons.alert} ფართო მოძრაობა! STOP! STAY CALM`;
                        panelClass = 'danger';

                        // ეკრანის გაწითლება
                        bodyNode.classList.add('main-alarm');

                        db.ref('stream/alarm').set(true);
                        triggerLocalMainVoice();
                    } else {
                        db.ref('stream/alarm').set(false);
                        bodyNode.classList.remove('main-alarm'); // თუ მოძრაობა გაჩერდა, ფონი ბრუნდება
                    }
                }

                // ჩარჩოს დახატვა მთელ ტანზე
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 4;
                ctx.strokeRect(bx, by, bWidth, bHeight);

                statusPanel.className = `status-panel ${panelClass}`;
                statusPanel.innerHTML = statusMessage;
                lastPersonCenter = currentCenter;

            } else {
                ctx.clearRect(0, 0, overlay.width, overlay.height);
                db.ref('stream/alarm').set(false);
                bodyNode.classList.remove('main-alarm');
                lastPersonCenter = null;

                if (wasPersonIdentified) {
                    db.ref('stream/lostAlarm').set(true);
                    statusPanel.className = 'status-panel danger';
                    statusPanel.innerHTML = `${svgIcons.alert} კრიტიკული განგაში: ობიექტი გაქრა!`;
                    triggerVoiceAlert("Target lost, return to camera!", 1.0, 0.9);
                } else {
                    statusPanel.className = 'status-panel';
                    statusPanel.innerHTML = `${svgIcons.success} დაცვა აქტიურია - ადამიანი არ ჩანს`;
                }
            }
        } catch (err) { console.error(err); }

        mainLoopTimeout = setTimeout(detectAndStreamLoop, 120); // სიჩქარის მომატება
    }

    function triggerLocalMainVoice() {
        // ძირითად მოწყობილობაზე ხმა ირთვება მაშინვე, ტაიმერების გარეშე
        const utterance = new SpeechSynthesisUtterance("Stop, stay calm");
        utterance.lang = "en-US";
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    function triggerVoiceAlert(text, rate, pitch) {
        if (isSpeaking) return;
        isSpeaking = true;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US"; utterance.rate = rate; utterance.pitch = pitch;
        utterance.onend = () => { setTimeout(() => { isSpeaking = false; }, 1500); };
        window.speechSynthesis.speak(utterance);
    }


    // --- დამხმარე მოწყობილობა (მონიტორინგი) ---
    function startMonitoring() {
        db.ref('stream/frame').on('value', handleFrameUpdate);
        db.ref('stream/alarm').on('value', handleAlarmUpdate);
        db.ref('stream/lostAlarm').on('value', handleLostAlarmUpdate);
    }

    function handleFrameUpdate(snapshot) {
        if (currentRole !== 'sub') return;
        const frameData = snapshot.val();
        if (frameData) liveImage.src = frameData;
    }

    // მოძრაობის შემჩნევა დამხმარეზე
    function handleAlarmUpdate(snapshot) {
        if (currentRole !== 'sub') return;
        if (snapshot.val() === true) {
            startSubContinuousAlarm();
        }
    }

    function handleLostAlarmUpdate(snapshot) {
        if (currentRole !== 'sub') return;
        if (snapshot.val() === true) {
            statusPanel.className = "status-panel danger";
            statusPanel.innerHTML = `${svgIcons.alert} კრიტიკული განგაში: ობიექტი გაქრა!`;
            bodyNode.classList.add('sub-flashing');
        } else if (!isSubAlarmActive) {
            bodyNode.classList.remove('sub-flashing');
            checkAndResetMonitorStatus();
        }
    }

    // დამხმარის უწყვეტი განგაშის და ციმციმის ჩართვა
    function startSubContinuousAlarm() {
        if (isSubAlarmActive) return;
        isSubAlarmActive = true;

        statusPanel.className = "status-panel danger";
        statusPanel.innerHTML = `${svgIcons.alert} განგაში! მოძრაობა დაფიქსირდა!`;
        bodyNode.classList.add('sub-flashing'); // ჩავრთოთ წითელი ციმციმი

        // უწყვეტად და გადაბმულად ყვირილი, სანამ ეკრანს ხელს არ დავაჭერთ
        subAlarmInterval = setInterval(() => {
            const utterance = new SpeechSynthesisUtterance("Warning");
            utterance.lang = "en-US";
            utterance.rate = 1.1;
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }, 800); 
    }

    // განგაშის ხელით გათიშვა დამხმარე მოწყობილობაზე
    function stopSubContinuousAlarm() {
        if (!isSubAlarmActive) return;
        isSubAlarmActive = false;
        
        clearInterval(subAlarmInterval);
        subAlarmInterval = null;
        window.speechSynthesis.cancel(); // მიმდინარე ხმის გათიშვა მომენტალურად

        bodyNode.classList.remove('sub-flashing'); // ციმციმის გათიშვა
        
        // ბაზის რეზეტი
        db.ref('stream/alarm').set(false);
        checkAndResetMonitorStatus();
    }

    function checkAndResetMonitorStatus() {
        if (isSubAlarmActive) return;
        db.ref('stream/lostAlarm').once('value', (snapshotLost) => {
            db.ref('stream/alarm').once('value', (snapshotAlarm) => {
                if (!snapshotLost.val() && !snapshotAlarm.val()) {
                    statusPanel.className = "status-panel identified";
                    statusPanel.innerHTML = `${svgIcons.success} ლაივი ჩართულია - ობიექტი უსაფრთხოა`;
                }
            });
        });
    }

    function resetToSetup() {
        if (mainLoopTimeout) clearTimeout(mainLoopTimeout);
        if (subAlarmInterval) clearInterval(subAlarmInterval);
        window.speechSynthesis.cancel();

        db.ref('stream/frame').off('value', handleFrameUpdate);
        db.ref('stream/alarm').off('value', handleAlarmUpdate);
        db.ref('stream/lostAlarm').off('value', handleLostAlarmUpdate);

        if (streamTrack) { streamTrack.stop(); streamTrack = null; }
        if (video.srcObject) video.srcObject = null;

        currentRole = null;
        lastPersonCenter = null;
        wasPersonIdentified = false;
        isSubAlarmActive = false;
        
        bodyNode.className = ""; 
        statusPanel.className = "status-panel";
        statusPanel.innerHTML = "სისტემა მზადყოფნაშია";
        
        video.classList.add('hidden');
        overlay.classList.add('hidden');
        liveImage.classList.add('hidden');
        subHint.classList.add('hidden');
        workScreen.classList.add('hidden');
        setupScreen.classList.remove('hidden');
    }
</script>
